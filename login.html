<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LearnFlow</title>
    <meta name="description" content="Login to LearnFlow to access your study planner.">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="blob blob-1 bg-secondary"></div>
    <div class="blob blob-2 bg-primary"></div>

    <main class="auth-container">
        <div class="glass-panel auth-card">
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin">Log In</div>
                <div class="auth-tab" id="tabSignup">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form-body active">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form-body">
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

        </div>
    </main>
</body>
</html>
